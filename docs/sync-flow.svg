<svg width="1000" height="520" viewBox="0 0 1000 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flow-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111714"/>
      <stop offset="100%" stop-color="#0d1210"/>
    </linearGradient>
    <linearGradient id="step-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1ed760" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#2f9ebf" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="step-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3a5246"/>
    </marker>
  </defs>

  <rect width="1000" height="520" rx="20" fill="url(#flow-bg)"/>

  <!-- Title -->
  <text x="500" y="44" fill="#f7fff9" font-family="Inter, system-ui, Segoe UI" font-size="22" font-weight="900" text-anchor="middle">Çalışma Akışı</text>
  <rect x="460" y="54" width="80" height="3" rx="1.5" fill="#1ed760"/>

  <!-- ========== STEP 1 ========== -->
  <g transform="translate(60, 100)">
    <rect x="0" y="0" width="180" height="120" rx="16" fill="#1a1f1c" stroke="#2a3530" stroke-width="1" filter="url(#step-shadow)"/>
    <rect x="0" y="0" width="180" height="120" rx="16" fill="url(#step-grad)"/>
    <circle cx="24" cy="28" r="14" fill="#1ed760" opacity="0.15"/>
    <text x="24" y="33" fill="#1ed760" font-family="Inter, system-ui" font-size="14" font-weight="900" text-anchor="middle">1</text>
    <text x="50" y="33" fill="#f7fff9" font-family="Inter, system-ui" font-size="15" font-weight="800">Video Algılama</text>
    <text x="16" y="62" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">content.js her sayfadaki</text>
    <text x="16" y="80" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">HTML5 video elementlerini</text>
    <text x="16" y="98" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">izler ve durumu bildirir.</text>
  </g>

  <!-- Arrow 1→2 -->
  <path d="M260 160 L320 160" stroke="#2a3530" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== STEP 2 ========== -->
  <g transform="translate(340, 100)">
    <rect x="0" y="0" width="180" height="120" rx="16" fill="#1a1f1c" stroke="#2a3530" stroke-width="1" filter="url(#step-shadow)"/>
    <rect x="0" y="0" width="180" height="120" rx="16" fill="url(#step-grad)"/>
    <circle cx="24" cy="28" r="14" fill="#2f9ebf" opacity="0.15"/>
    <text x="24" y="33" fill="#2f9ebf" font-family="Inter, system-ui" font-size="14" font-weight="900" text-anchor="middle">2</text>
    <text x="50" y="33" fill="#f7fff9" font-family="Inter, system-ui" font-size="15" font-weight="800">Durum Senkronu</text>
    <text x="16" y="62" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">background.js video</text>
    <text x="16" y="80" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">durumunu saklar ve</text>
    <text x="16" y="98" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">Spotify ile eşleştirir.</text>
  </g>

  <!-- Arrow 2→3 -->
  <path d="M540 160 L600 160" stroke="#2a3530" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== STEP 3 ========== -->
  <g transform="translate(620, 100)">
    <rect x="0" y="0" width="180" height="120" rx="16" fill="#1a1f1c" stroke="#2a3530" stroke-width="1" filter="url(#step-shadow)"/>
    <rect x="0" y="0" width="180" height="120" rx="16" fill="url(#step-grad)"/>
    <circle cx="24" cy="28" r="14" fill="#f6c85f" opacity="0.15"/>
    <text x="24" y="33" fill="#f6c85f" font-family="Inter, system-ui" font-size="14" font-weight="900" text-anchor="middle">3</text>
    <text x="50" y="33" fill="#f7fff9" font-family="Inter, system-ui" font-size="15" font-weight="800">Spotify Kontrol</text>
    <text x="16" y="62" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">spotifyController.js</text>
    <text x="16" y="80" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">DOM üzerinden oynat /</text>
    <text x="16" y="98" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">duraklat komutu verir.</text>
  </g>

  <!-- Arrow 3→4 (down) -->
  <path d="M710 220 L710 260" stroke="#2a3530" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== STEP 4 ========== -->
  <g transform="translate(340, 280)">
    <rect x="0" y="0" width="320" height="110" rx="16" fill="#1a1f1c" stroke="#2a3530" stroke-width="1" filter="url(#step-shadow)"/>
    <rect x="0" y="0" width="320" height="110" rx="16" fill="url(#step-grad)"/>
    <circle cx="24" cy="28" r="14" fill="#1ed760" opacity="0.15"/>
    <text x="24" y="33" fill="#1ed760" font-family="Inter, system-ui" font-size="14" font-weight="900" text-anchor="middle">4</text>
    <text x="50" y="33" fill="#f7fff9" font-family="Inter, system-ui" font-size="15" font-weight="800">Inline Bar &amp; Bildirimler</text>
    <text x="16" y="62" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">Video başladığında bar otomatik açılır. Toast bildirimleri</text>
    <text x="16" y="80" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">gösterilir. Ses sınırı, oynat/duraklat ve kısayollar</text>
    <text x="16" y="98" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">tek tıkla erişilebilir.</text>
  </g>

  <!-- Arrow 4→5 (down) -->
  <path d="M500 390 L500 420" stroke="#2a3530" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ========== STEP 5 ========== -->
  <g transform="translate(340, 440)">
    <rect x="0" y="0" width="320" height="60" rx="16" fill="#0f1412" stroke="#1ed760" stroke-width="1" stroke-opacity="0.25" filter="url(#step-shadow)"/>
    <text x="24" y="24" fill="#f7fff9" font-family="Inter, system-ui" font-size="14" font-weight="800">Video Bittiğinde</text>
    <text x="24" y="46" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">Spotify sadece eklenti durdurduysa otomatik devam eder.</text>
  </g>

  <!-- Side legend -->
  <g transform="translate(840, 280)">
    <rect x="0" y="0" width="120" height="110" rx="12" fill="#1a1f1c" stroke="#2a3530" stroke-width="1"/>
    <text x="16" y="28" fill="#f7fff9" font-family="Inter, system-ui" font-size="12" font-weight="800">Bileşenler</text>
    <rect x="16" y="42" width="10" height="10" rx="3" fill="#1ed760"/>
    <text x="34" y="51" fill="#8fa89a" font-family="Inter, system-ui" font-size="11" font-weight="500">content.js</text>
    <rect x="16" y="64" width="10" height="10" rx="3" fill="#2f9ebf"/>
    <text x="34" y="73" fill="#8fa89a" font-family="Inter, system-ui" font-size="11" font-weight="500">background.js</text>
    <rect x="16" y="86" width="10" height="10" rx="3" fill="#f6c85f"/>
    <text x="34" y="95" fill="#8fa89a" font-family="Inter, system-ui" font-size="11" font-weight="500">bar.js</text>
  </g>
</svg>
