<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-grad" cx="0.5" cy="0.4" r="0.8">
      <stop offset="0%" stop-color="#1a2e22"/>
      <stop offset="50%" stop-color="#101312"/>
      <stop offset="100%" stop-color="#0a0c0b"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="25" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="bar-shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Gradients -->
    <linearGradient id="bar-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1ed760" stop-opacity="0.25"/>
      <stop offset="40%" stop-color="#2f9ebf" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f6c85f" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="vinyl-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1ed760"/>
      <stop offset="55%" stop-color="#2f9ebf"/>
      <stop offset="100%" stop-color="#f6c85f"/>
    </linearGradient>
    <linearGradient id="play-btn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ee46d"/>
      <stop offset="100%" stop-color="#1ed760"/>
    </linearGradient>

    <!-- Patterns -->
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#ffffff" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="640" fill="url(#bg-grad)"/>
  <rect width="1200" height="640" fill="url(#dots)"/>

  <!-- Decorative orbs -->
  <circle cx="1000" cy="140" r="220" fill="#1ed760" opacity="0.06" filter="url(#glow-green)"/>
  <circle cx="180" cy="520" r="200" fill="#2f9ebf" opacity="0.05" filter="url(#glow-blue)"/>
  <circle cx="680" cy="580" r="140" fill="#f6c85f" opacity="0.04"/>

  <!-- ============================================ -->
  <!-- LEFT: Inline Bar Mockup                      -->
  <!-- ============================================ -->
  <g transform="translate(80, 120)" filter="url(#bar-shadow)">
    <!-- Browser chrome mockup -->
    <rect x="0" y="0" width="520" height="400" rx="20" fill="#1a1f1c" stroke="#2a3530" stroke-width="1"/>
    <rect x="0" y="0" width="520" height="32" rx="20" fill="#242b27"/>
    <rect x="0" y="16" width="520" height="16" fill="#242b27"/>
    <circle cx="22" cy="16" r="5" fill="#ff5f57" opacity="0.8"/>
    <circle cx="40" cy="16" r="5" fill="#febc2e" opacity="0.8"/>
    <circle cx="58" cy="16" r="5" fill="#28c840" opacity="0.8"/>

    <!-- Page content hint -->
    <rect x="20" y="48" width="200" height="12" rx="6" fill="#2a3530"/>
    <rect x="20" y="72" width="320" height="8" rx="4" fill="#1f2824"/>
    <rect x="20" y="88" width="280" height="8" rx="4" fill="#1f2824"/>
    <rect x="20" y="104" width="360" height="8" rx="4" fill="#1f2824"/>

    <!-- Video player mockup -->
    <rect x="20" y="130" width="480" height="200" rx="12" fill="#0f1412"/>
    <rect x="20" y="130" width="480" height="200" rx="12" fill="url(#bg-grad)" opacity="0.5"/>
    <circle cx="260" cy="230" r="36" fill="#ffffff" opacity="0.1"/>
    <polygon points="248,214 248,246 280,230" fill="#ffffff" opacity="0.9"/>

    <!-- THE INLINE BAR -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="520" height="44" fill="#111714" opacity="0.95"/>
      <rect x="0" y="0" width="520" height="44" fill="url(#bar-grad)"/>
      <rect x="0" y="44" width="520" height="1" fill="#ffffff" opacity="0.08"/>

      <!-- Brand icon + track -->
      <rect x="12" y="10" width="24" height="24" rx="6" fill="#1ed760"/>
      <rect x="44" y="11" width="120" height="10" rx="5" fill="#ffffff" opacity="0.9"/>
      <rect x="44" y="25" width="80" height="8" rx="4" fill="#ffffff" opacity="0.4"/>

      <!-- Center controls -->
      <rect x="206" y="9" width="28" height="26" rx="7" fill="#ffffff" opacity="0.1" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>
      <text x="213" y="27" fill="#f7fff9" font-family="Inter,system-ui" font-size="14" font-weight="900">‹‹</text>

      <rect x="242" y="7" width="52" height="30" rx="8" fill="url(#play-btn)"/>
      <text x="258" y="28" fill="#07140c" font-family="Inter,system-ui" font-size="12" font-weight="900">Oynat</text>

      <rect x="302" y="9" width="28" height="26" rx="7" fill="#ffffff" opacity="0.1" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>
      <text x="309" y="27" fill="#f7fff9" font-family="Inter,system-ui" font-size="14" font-weight="900">››</text>

      <!-- Volume -->
      <rect x="342" y="15" width="60" height="6" rx="3" fill="#ffffff" opacity="0.15"/>
      <rect x="342" y="15" width="36" height="6" rx="3" fill="#1ed760"/>
      <circle cx="378" cy="18" r="5" fill="#1ed760"/>

      <!-- Right meta -->
      <rect x="424" y="12" width="54" height="20" rx="10" fill="#2f9ebf" opacity="0.18" stroke="#2f9ebf" stroke-width="1" stroke-opacity="0.3"/>
      <text x="435" y="26" fill="#d8f6ff" font-family="Inter,system-ui" font-size="10" font-weight="900">Video aktif</text>

      <text x="488" y="27" fill="#f7fff9" font-family="Inter,system-ui" font-size="14">&#9881;</text>
      <text x="504" y="27" fill="#f7fff9" font-family="Inter,system-ui" font-size="14">&#10005;</text>
    </g>

    <!-- Trigger button mockup -->
    <rect x="468" y="-32" width="32" height="32" rx="0 0 8 8" fill="#111714" stroke="#2a3530" stroke-width="1" filter="url(#soft-shadow)"/>
    <rect x="474" y="-26" width="20" height="20" rx="5" fill="#1ed760"/>
  </g>

  <!-- ============================================ -->
  <!-- RIGHT: Text & badges                         -->
  <!-- ============================================ -->
  <g transform="translate(680, 140)">
    <text x="0" y="0" fill="#ffffff" font-family="Inter, system-ui, -apple-system, Segoe UI" font-size="52" font-weight="950" letter-spacing="-0.02em">Harmoni</text>

    <text x="0" y="46" fill="#b9c6bf" font-family="Inter, system-ui" font-size="20" font-weight="500" line-height="1.5">Video izlerken Spotify'inizi otomatik yönetir.</text>

    <!-- Divider line -->
    <rect x="0" y="76" width="60" height="3" rx="1.5" fill="#1ed760"/>

    <!-- Feature bullets -->
    <g transform="translate(0, 108)">
      <g transform="translate(0, 0)">
        <circle cx="8" cy="8" r="8" fill="#1ed760" opacity="0.2"/>
        <circle cx="8" cy="8" r="3" fill="#1ed760"/>
        <text x="26" y="13" fill="#e0ece4" font-family="Inter, system-ui" font-size="15" font-weight="600">Inline kontrol barı — popup yok</text>
      </g>
      <g transform="translate(0, 36)">
        <circle cx="8" cy="8" r="8" fill="#2f9ebf" opacity="0.2"/>
        <circle cx="8" cy="8" r="3" fill="#2f9ebf"/>
        <text x="26" y="13" fill="#e0ece4" font-family="Inter, system-ui" font-size="15" font-weight="600">Video tespitinde otomatik açılma</text>
      </g>
      <g transform="translate(0, 72)">
        <circle cx="8" cy="8" r="8" fill="#f6c85f" opacity="0.2"/>
        <circle cx="8" cy="8" r="3" fill="#f6c85f"/>
        <text x="26" y="13" fill="#e0ece4" font-family="Inter, system-ui" font-size="15" font-weight="600">Klavye kısayolları &amp; sürüklenebilir tetikleyici</text>
      </g>
    </g>

    <!-- Badges -->
    <g transform="translate(0, 226)">
      <rect x="0" y="0" width="164" height="40" rx="20" fill="#1ed760"/>
      <text x="24" y="26" fill="#07140c" font-family="Inter, system-ui" font-size="14" font-weight="900">Manifest V3</text>
      <rect x="180" y="0" width="150" height="40" rx="20" fill="#ffffff" opacity="0.1" stroke="#ffffff" stroke-width="1" stroke-opacity="0.15"/>
      <text x="204" y="26" fill="#f7fff9" font-family="Inter, system-ui" font-size="14" font-weight="700">Vanilla JS</text>
    </g>

    <!-- Animated sync indicator (static representation) -->
    <g transform="translate(0, 310)">
      <rect x="0" y="0" width="420" height="80" rx="16" fill="#ffffff" opacity="0.06" stroke="#ffffff" stroke-width="1" stroke-opacity="0.08"/>

      <!-- Spotify side -->
      <circle cx="50" cy="40" r="22" fill="#1ed760" opacity="0.2"/>
      <path d="M38 40c6-2 12-1 16 2" stroke="#1ed760" stroke-width="3" stroke-linecap="round"/>
      <path d="M41 46c4-1 8-1 11 1" stroke="#1ed760" stroke-width="2" stroke-linecap="round"/>
      <text x="82" y="36" fill="#f7fff9" font-family="Inter, system-ui" font-size="14" font-weight="800">Spotify</text>
      <text x="82" y="54" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500">Duraklatıldı</text>

      <!-- Connection line -->
      <line x1="160" y1="40" x2="260" y2="40" stroke="#ffffff" stroke-width="2" stroke-opacity="0.1" stroke-dasharray="6 4"/>
      <circle cx="210" cy="40" r="16" fill="#2f9ebf" opacity="0.2"/>
      <path d="M202 34l12 6-12 6V34z" fill="#2f9ebf"/>

      <!-- Video side -->
      <circle cx="370" cy="40" r="22" fill="#f6c85f" opacity="0.2"/>
      <rect x="360" y="32" width="14" height="10" rx="2" fill="#f6c85f"/>
      <polygon points="365,36 365,38 368,37" fill="#111714"/>
      <text x="316" y="36" fill="#f7fff9" font-family="Inter, system-ui" font-size="14" font-weight="800" text-anchor="end">Video</text>
      <text x="316" y="54" fill="#8fa89a" font-family="Inter, system-ui" font-size="12" font-weight="500" text-anchor="end">Aktif</text>
    </g>
  </g>
</svg>
